<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
    <title>Coffee Page</title>

    <style>
        body {
            background-color: brown;
            color: #fff8e1;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 50px;
        }

        .coffee-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .text {
            max-width: 400px;
            text-align: left;
        }

        h1 {
            color: #ffd59e;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
            color: #fbe9e7;
        }
    </style>
</head>

<body>

<div class="container">
    <img class="coffee-img" src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" alt="Coffee">

    <div class="text">
        <h1>Coffee Time</h1>
        <p>Coffee is one of the most popular drinks in the world, known for its rich flavor and energizing effect.</p>
        <p>It can be enjoyed in many forms, from espresso to iced coffee.</p>
    </div>
</div>

</body>
</html>
